---
launch:

  # =======================
  # Launch arguments
  # =======================

  - arg:
      name: arm_activate
      default: 'False'
      description: Whether to activate the manipulator arm on startup.
      choice:
        - value: 'True'
        - value: 'False'

  - arg:
      name: config_dir
      default: ''
      description: Path to the common configuration directory.

  - arg:
      name: configuration
      default: basic
      description: Specify configuration packages.
      choice:
        - value: basic
        - value: telepresence
        - value: autonomy
        - value: manipulation
        - value: manipulation_pro
        - value: custom

  - arg:
      name: manipulator_serial_port
      default: /dev/manipulator
      description: Port to connect to the manipulator.

  - arg:
      name: robot_model
      default: $(env ROBOT_MODEL '')
      description: Specify robot model
      choice:
        - value: rosbot
        - value: rosbot_xl

  - arg:
      name: mecanum
      default: $(eval "'True' if '$(var robot_model)' == 'rosbot_xl' else 'False'")
      description: Whether to use mecanum drive controller
      choice:
        - value: 'True'
        - value: 'False'

  - arg:
      name: namespace
      default: $(env ROBOT_NAMESPACE '')
      description: Add namespace to all launched nodes.

  - arg:
      name: use_sim
      default: 'False'
      description: Use simulation

  # =======================
  # Derived values
  # =======================

  - let:
      name: ns
      value: $(eval "('$(var namespace)/' if '$(var namespace)' else '')")

  - let:
      name: pkg_config_path
      value: $(eval "('$(var config_dir)/rosbot_controller' if '$(var config_dir)' else '$(find-pkg-share
        rosbot_controller)') + '/config'")

  - let:
      name: controller_config
      value: $(var pkg_config_path)/$(var robot_model)/controllers.yaml

  - let:
      name: manipulator_state
      value: $(eval "('active' if $(var arm_activate) else 'inactive')")

  - let:
      name: resolved_controller_config
      value: /tmp/rosbot_controller_$(var namespace).yaml

  # =======================
  # Resolve controller config (ReplaceString)
  # =======================

  - executable:
      cmd: |
        bash -c "
          sed \
            -e 's|<namespace>/|"$(var ns)"|g' \
            -e 's|<manipulator_state>|"$(var manipulator_state)"|g' \
            "$(var controller_config)" \
            > "$(var resolved_controller_config)"
        "

  # =======================
  # Load URDF
  # =======================

  - include:
      file: $(find-pkg-share rosbot_description)/launch/$(var robot_model).yaml
      let:
        - name: configuration
          value: $(var configuration)
        - name: controller_config
          value: $(var resolved_controller_config)
        - name: manipulator_serial_port
          value: $(var manipulator_serial_port)
        - name: mock_joints
          value: 'False'
        - name: use_sim
          value: $(var use_sim)

  # =======================
  # Controllers (wait few seconds to resolve parameters file)
  # =======================

  - timer:
      period: 3.0
      children:
        - node:
            unless: $(var use_sim)
            pkg: controller_manager
            exec: ros2_control_node
            param:
              - from: $(var resolved_controller_config)
        - node:
            pkg: controller_manager
            exec: spawner
            args: >
              $(eval "'mecanum_drive_controller' if $(var mecanum) else 'differential_drive_controller'")
              imu_broadcaster
              joint_state_broadcaster
              -c controller_manager
              --activate-as-group
              --controller-manager-timeout 20
              --controller-ros-args
              "--ros-args
              -r ~/cmd_vel:=cmd_vel
              -r ~/odom:=odometry/wheels
              -r ~/imu:=imu/data"

  # =======================
  # Manipulator (delayed)
  # =======================

  - timer:
      period: 5.0
      if: $(eval "'$(var configuration)'.startswith('manipulation')")
      children:
        - include:
            file: $(find-pkg-share rosbot_controller)/launch/manipulator.yaml
            let:
              - name: arm_activate
                value: $(var arm_activate)
